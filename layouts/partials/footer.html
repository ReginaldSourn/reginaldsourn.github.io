<footer class="footer">
  <p class="footer__copy">{{ .Site.Params.name }} &copy; {{ now.Year }}</p>
  <div class="footer__links">
    <a href="mailto:{{ .Site.Params.email }}">{{ .Site.Params.email }}</a>
    {{ with .Site.Params.github }}<a href="{{ . }}" target="_blank" rel="noopener">GitHub</a>{{ end }}
  </div>
</footer>
